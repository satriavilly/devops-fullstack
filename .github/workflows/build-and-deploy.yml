name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set short SHA as image tag
      id: vars
      run: echo "TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.backend
        push: true
        tags: |
          satriav/myapp-backend:${{ steps.vars.outputs.TAG }}
          satriav/myapp-backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.frontend
        push: true
        build-args: |
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
        tags: |
          satriav/myapp-frontend:${{ steps.vars.outputs.TAG }}
          satriav/myapp-frontend:latest

    - name: Update image tags in k8s-config repo
      run: |
        git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/satriavilly/fullstack-app-dummy-k8s-config.git
        cd fullstack-app-dummy-k8s-config

        find . -name "*.yaml" -o -name "*.yml" | xargs grep -l "myapp-backend" | xargs sed -i "s|satriav/myapp-backend:.*|satriav/myapp-backend:${{ steps.vars.outputs.TAG }}|"
        find . -name "*.yaml" -o -name "*.yml" | xargs grep -l "myapp-frontend" | xargs sed -i "s|satriav/myapp-frontend:.*|satriav/myapp-frontend:${{ steps.vars.outputs.TAG }}|"

        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions"
        git add -A
        git commit -m "ci: update image tags to ${{ steps.vars.outputs.TAG }}"
        git push

    - name: Notify Telegram (success)
      if: success()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="Markdown" \
          -d text="✅ *Build & Deploy Berhasil*
        Repo: \`${{ github.repository }}\`
        Branch: \`${{ github.ref_name }}\`
        Commit: \`${{ steps.vars.outputs.TAG }}\` — ${{ github.event.head_commit.message }}
        Actor: ${{ github.actor }}
        [Lihat workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

    - name: Notify Telegram (failure)
      if: failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="Markdown" \
          -d text="❌ *Build & Deploy GAGAL*
        Repo: \`${{ github.repository }}\`
        Branch: \`${{ github.ref_name }}\`
        Commit: \`${{ steps.vars.outputs.TAG }}\` — ${{ github.event.head_commit.message }}
        Actor: ${{ github.actor }}
        [Lihat workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
