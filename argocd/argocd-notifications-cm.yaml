apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.webhook.tg: |
    url: https://api.telegram.org/bot$telegram-token/sendMessage
    headers:
      - name: Content-Type
        value: application/json

  template.app-deployed: |
    webhook:
      tg:
        method: POST
        body: |
          {"chat_id": 199643258, "parse_mode": "HTML", "text": "✅ <b>ArgoCD: Deploy Berhasil</b>\nApp: <code>{{.app.metadata.name}}</code>\nStatus: <code>{{.app.status.sync.status}}</code>\nHealth: <code>{{.app.status.health.status}}</code>"}

  template.app-sync-failed: |
    webhook:
      tg:
        method: POST
        body: |
          {"chat_id": 199643258, "parse_mode": "HTML", "text": "❌ <b>ArgoCD: Sync GAGAL</b>\nApp: <code>{{.app.metadata.name}}</code>\nStatus: <code>{{.app.status.sync.status}}</code>"}

  template.app-degraded: |
    webhook:
      tg:
        method: POST
        body: |
          {"chat_id": 199643258, "parse_mode": "HTML", "text": "⚠️ <b>ArgoCD: App Degraded</b>\nApp: <code>{{.app.metadata.name}}</code>\nHealth: <code>{{.app.status.health.status}}</code>"}

  trigger.on-deployed: |
    - when: app.status.operationState != nil && app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.operationState.syncResult.revision
      send: [app-deployed]

  trigger.on-sync-failed: |
    - when: app.status.operationState != nil && app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-degraded]

  defaultTriggers: |
    - on-deployed
    - on-sync-failed
    - on-degraded
