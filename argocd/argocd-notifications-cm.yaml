apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.telegram: |
    token: $telegram-token

  template.app-deployed: |
    message: |
      ✅ *ArgoCD: Deploy Berhasil*
      App: `{{.app.metadata.name}}`
      Status: `{{.app.status.sync.status}}`
      Health: `{{.app.status.health.status}}`
      Revision: `{{.app.status.sync.revision | substr 0 7}}`
      {{if .app.status.operationState.syncResult.source.repoURL}}Repo: {{.app.status.operationState.syncResult.source.repoURL}}{{end}}

  template.app-sync-failed: |
    message: |
      ❌ *ArgoCD: Sync GAGAL*
      App: `{{.app.metadata.name}}`
      Status: `{{.app.status.sync.status}}`
      Error: {{.app.status.conditions | toJson}}

  template.app-degraded: |
    message: |
      ⚠️ *ArgoCD: App Degraded*
      App: `{{.app.metadata.name}}`
      Health: `{{.app.status.health.status}}`
      Message: {{.app.status.health.message}}

  trigger.on-deployed: |
    - when: app.status.operationState != nil && app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-deployed]

  trigger.on-sync-failed: |
    - when: app.status.operationState != nil && app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-degraded]

  defaultTriggers: |
    - on-deployed
    - on-sync-failed
    - on-degraded
